apiVersion: apps/v1
kind: Deployment
metadata:
  name: max-web
  labels:
    app: max-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: max-web
  template:
    metadata:
      labels:
        app: max-web
    spec:
      containers:
        - name: max-web
          image: max-web:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
