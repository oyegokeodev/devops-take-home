name: Terraform

run-name: "terraform ${{ github.event_name }} @ ${{ github.head_ref || github.ref_name }}"

on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write

jobs:
  terraform-sync:
    name: Terraform Sync
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project path
        run: |
          if [ ! -d "${{ env.TF_WORKING_DIR }}" ]; then
            echo "Project path not found: ${{ env.TF_WORKING_DIR }}"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -out=tfplan

      - name: Save Plan Text
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -no-color tfplan > .plan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_number }}
          path: ${{ env.TF_WORKING_DIR }}/.plan.txt

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
