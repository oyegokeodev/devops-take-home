name: Terraform

run-name: "terraform ${{ github.event.inputs.action || 'plan' }} (${{ github.event.inputs.environment || 'staging' }}) @ ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
permissions:
  contents: read
  id-token: write

jobs:
  terraform-sync:
    name: Terraform Sync
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_ENVIRONMENT: ${{ github.event.inputs.environment }}
      TF_CLUSTER_NAME: max-fargate-cluster-${{ github.event.inputs.environment }}
      TF_TAGS: '{Project="devops-take-home",ManagedBy="terraform",Environment="${{ github.event.inputs.environment }}"}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project path
        run: |
          if [ ! -d "${{ env.TF_WORKING_DIR }}" ]; then
            echo "Project path not found: ${{ env.TF_WORKING_DIR }}"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Select Terraform Workspace
        working-directory: ${{ env.TF_WORKING_DIR }}
        shell: bash
        run: |
          terraform workspace select "${TF_ENVIRONMENT}" || terraform workspace new "${TF_ENVIRONMENT}"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: github.event.inputs.action != 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="cluster_name=${TF_CLUSTER_NAME}" \
            -var="tags=${TF_TAGS}" \
            -out=tfplan

      - name: Terraform Plan Destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -destroy \
            -var="cluster_name=${TF_CLUSTER_NAME}" \
            -var="tags=${TF_TAGS}" \
            -out=tfplan

      - name: Save Plan Text
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ env.TF_ENVIRONMENT }}-${{ github.run_number }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan.txt

      - name: Enforce main for mutating actions
        if: github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy'
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Mutating actions (apply/destroy) are only allowed on main."
            exit 1
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy (apply destroy plan)
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
