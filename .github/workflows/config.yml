name: Terraform

run-name: "terraform ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }} @ ${{ github.ref_name }}"

on:
  push:
    branches: [main]
    paths:
      - terraform/**
      - .github/workflows/config.yml
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      destroy_confirm:
        description: Type DESTROY to confirm destroy action
        required: false
        default: ""
        type: string
permissions:
  contents: read
  id-token: write

jobs:
  terraform-sync:
    name: Terraform Sync
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-main
      cancel-in-progress: false

    env:
      TF_WORKING_DIR: terraform
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action || 'plan' }}
      TF_CLUSTER_NAME: max-fargate-cluster
      TF_TAGS: '{Project="devops-take-home",ManagedBy="terraform"}'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate project path
        run: |
          if [ ! -d "${{ env.TF_WORKING_DIR }}" ]; then
            echo "Project path not found: ${{ env.TF_WORKING_DIR }}"
            exit 1
          fi

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE || secrets.AWS_ROLE_TO_ASSUME }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.11.0

      - name: Terraform Fmt
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: env.TF_ACTION != 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="cluster_name=${TF_CLUSTER_NAME}" \
            -var="tags=${TF_TAGS}" \
            -out=tfplan

      - name: Terraform Plan Destroy
        if: env.TF_ACTION == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan -destroy \
            -var="cluster_name=${TF_CLUSTER_NAME}" \
            -var="tags=${TF_TAGS}" \
            -out=tfplan

      - name: Save Plan Text
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform show -no-color tfplan > tfplan.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.run_number }}
          path: ${{ env.TF_WORKING_DIR }}/tfplan.txt

      - name: Enforce main for mutating actions
        if: env.TF_ACTION == 'apply' || env.TF_ACTION == 'destroy'
        shell: bash
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Mutating actions (apply/destroy) are only allowed on main."
            exit 1
          fi

      - name: Enforce destroy confirmation
        if: env.TF_ACTION == 'destroy'
        shell: bash
        run: |
          if [ "${{ github.event.inputs.destroy_confirm }}" != "DESTROY" ]; then
            echo "Destroy action requires destroy_confirm=DESTROY"
            exit 1
          fi

      - name: Terraform Apply
        if: env.TF_ACTION == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy (apply destroy plan)
        if: env.TF_ACTION == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan
